services:
  # 1. Backend Service (Express API)
  - type: web
    name: kanbi-kitchen-api
    runtime: node
    rootDir: backend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      # - key: OPENAI_API_KEY  # Add this via Render Dashboard for security
      #   sync: false

  # 2. Frontend Service (Vite Static Site)
  - type: static
    name: kanbi-kitchen-ui
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    routes:
      # Redirect /api/* to the backend service
      - type: rewrite
        source: "/api/*"
        destination: "https://kanbi-kitchen-api.onrender.com/api/*"
      # Standard SPA rewrite for other routes
      - type: rewrite
        source: "/*"
        destination: "/index.html"
